<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>¿Quién lo dijo? — Pantalla Principal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ── LOBBY ──────────────────────────────────────────────────────────────── -->
<div id="screen-lobby" class="screen">
  <div class="logo">¿Quién lo dijo?</div>
  <p class="subtitle">El juego para romper el hielo 🧊</p>

  <div class="qr-box">
    <img id="qr-img" src="" alt="QR Code" />
  </div>
  <div class="join-url" id="join-url">Cargando...</div>
  <p class="muted">Escanea el código o visita la URL desde tu celular</p>

  <div id="player-grid" class="player-grid"></div>

  <div style="display:flex; gap:12px; flex-wrap:wrap; justify-content:center;">
    <button class="btn-primary" id="btn-start" disabled>
      Iniciar Ronda ▶
    </button>
    <button class="btn-secondary" id="btn-reset">Reiniciar Juego</button>
  </div>
  <p class="muted" id="min-players-hint">Necesitas al menos 2 jugadores para comenzar</p>
</div>

<!-- ── ANSWERING ──────────────────────────────────────────────────────────── -->
<div id="screen-answering" class="screen hidden">
  <p class="muted" id="round-label">Ronda 1</p>
  <div class="question-text" id="question-display"></div>

  <div class="progress-bar-wrap">
    <div class="progress-bar" id="answer-progress" style="width:0%"></div>
  </div>
  <p class="muted" id="answer-count">0 / 0 respuestas recibidas</p>

  <div id="answering-player-grid" class="player-grid"></div>

  <button class="btn-secondary" id="btn-force-voting">
    Continuar sin todos →
  </button>
</div>

<!-- ── VOTING ─────────────────────────────────────────────────────────────── -->
<div id="screen-voting" class="screen hidden">
  <p class="muted">Fase de votación</p>
  <div class="question-text" id="voting-question"></div>
  <p style="color:var(--accent2); font-size:1.1rem; font-weight:700;">
    ¿Quién crees que dijo cada respuesta? Vota desde tu celular 📱
  </p>

  <div class="answers-grid" id="voting-answers-grid"></div>

  <button class="btn-secondary" id="btn-force-results">
    Ver resultados →
  </button>
</div>

<!-- ── RESULTS ────────────────────────────────────────────────────────────── -->
<div id="screen-results" class="screen hidden">
  <div class="logo" style="font-size:2rem;">Resultados 🎉</div>
  <div class="answers-grid" id="results-answers-grid"></div>

  <div class="score-list" id="results-scores"></div>

  <div style="display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-top:8px;">
    <button class="btn-primary" id="btn-next-round">Siguiente Ronda ▶</button>
    <button class="btn-secondary" id="btn-reset-2">Reiniciar Juego</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="host.js"></script>
</body>
</html>
